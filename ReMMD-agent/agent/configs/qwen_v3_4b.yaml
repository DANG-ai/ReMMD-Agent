# ReMMD-Agent — qwen3.5-4b v3 configuration (4B model swap)
#
# Same as qwen_v3.yaml except the chat/vision model is qwen3.5-4b instead of
# qwen3.5-9b. The endpoint URL is identical — both models live behind the
# same vLLM router at
#   http://YOUR_QWEN_9B_ENDPOINT/v1
# so only `llm.model` changes here.
#
# All other settings are inherited verbatim from the well-tested qwen_v3
# baseline (no-thinking, deterministic, strict LLM-only mode, v3 prompts).
#
# Run with:
#   python scripts/run_eval.py --config configs/qwen_v3_4b.yaml \
#       --tag qwen_v3_4b_full500 --concurrency 500

llm:
  model: "qwen3.5-4b"
  base_url: "http://YOUR_QWEN_9B_ENDPOINT/v1"
  api_key: "qwen"
  temperature: 0.0
  judge_temperature: 0.0
  image_analyzer_temperature: 0.0
  text_analyzer_temperature: 0.2
  pattern_temperature: 0.0
  atomic_image_temperature: 0.0
  atomic_cross_modal_temperature: 0.2
  atomic_text_temperature: 0.0
  max_tokens: 8192               # legacy single-shot atomic (unused in split mode)
  max_tokens_atomic_image: 6144  # split-mode image-only parser
  max_tokens_atomic_cross_modal: 6144  # split-mode cross-modal parser
  max_tokens_atomic_text: 8192   # split-mode text-only parser
  max_tokens_judge: 16384        # final judge — JSON with structured reasoning
  max_tokens_pattern: 4096       # pattern detector (disabled by default)
  max_tokens_image_analyzer: 8192  # focused per-image vision pass
  max_tokens_text_analyzer: 6144   # focused text-distortion pass
  # Same no-thinking discipline as v3 — keeps JSON output stable and the
  # token budget comfortable. The 4B variant inherits this.
  atomic_enable_thinking: false
  judge_enable_thinking: false
  pattern_enable_thinking: false
  image_analyzer_enable_thinking: false
  text_analyzer_enable_thinking: false
  request_timeout: 600
  use_proxy: false               # qwen endpoints are intranet, no proxy
  proxy_url: null
  retry_max_attempts: 6
  retry_backoff_seconds: 5

embedding:
  model: "qwen3-embedding-8b"
  base_url: "http://YOUR_QWEN_EMBEDDING_ENDPOINT/v1"
  api_key: "qwen"
  max_input_chars: 32000
  batch_size: 8
  request_timeout: 600
  use_proxy: false
  retry_max_attempts: 6
  retry_backoff_seconds: 5

vision:
  max_image_side: 896
  max_image_side_analyzer: 1280
  max_image_side_split_image: 1024
  max_images_per_call: 6
  jpeg_quality: 92

search_tools:
  google_serper:
    api_key: ""
    endpoint: "https://google.serper.dev/search"
  baidu:
    api_key: ""
    endpoint: ""
  x:
    api_key: ""
    endpoint: ""

paths:
  bench_root: "/path/to/ReMMD-Agent/ReMMD-agent/ReMMDBench"
  corpus_jsonl: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/corpus.jsonl"
  sample_to_evidence: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/sample_to_evidence.json"
  level1_doc: "/path/to/ReMMD-Agent/ReMMD-agent/一级标签.txt"
  level2_doc: "/path/to/ReMMD-Agent/ReMMD-agent/二级标签.docx"
  rag_index_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/rag_index"
  runs_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/runs"
  prompts_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/prompts"

rag:
  top_k_per_atom: 12
  max_evidence_per_sample: 30
  min_score: 0.0
  per_type_quota:
    image_content: 12
    news_snippet: 12
    fact_brief: 10
    fact_check: 6
    social_post: 6

pipeline:
  concurrency: 500               # full 500 / 500 = 1 wave per stage
  save_atomic_points: true
  save_retrieved_evidence: true
  save_judge_io: true
  resume: true                   # skip samples whose final result file already exists
  atomic_mode: "split"           # "single" | "multi" | "split"
  atomic_n_passes: 3             # only used when atomic_mode == "multi"
  # ===== STRICT LLM-ONLY MODE =====
  # All three levels come VERBATIM from the LLM judge — no code rule
  # promotes / demotes L1 based on L2 composition, no analyzer-L2 union,
  # no fallback. Mirrors qwen_v3.yaml exactly.
  disable_l1_l2_coupling: true
  analyzer_union_policy: "off"
  use_analyzer_l2_union: null
  judge_prompt_name: "final_judge_v3"
  image_analyzer_prompt_name: "image_analyze_v3"
  text_analyzer_prompt_name: "text_analyze_v3"
  split_image_prompt_name: "image_atom_parse"
  split_cross_modal_prompt_name: "cross_modal_atom_parse"
  split_text_prompt_name: "text_atom_parse"
  use_pattern_detector: false
  use_image_analyzer: true
  use_text_analyzer: true
