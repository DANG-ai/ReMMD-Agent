# ReMMD-Agent default configuration
# All endpoints/models can be overridden by CLI.

llm:
  model: "gpt-5.2"
  base_url: "http://YOUR_GPT_ENDPOINT/v1"
  api_key: "sk-YOUR_GPT_API_KEY_HERE"
  # GPT-5 / o-series only accept the default temperature; the values below
  # are ignored by the client for reasoning models, but kept for qwen runs.
  temperature: 0.0
  judge_temperature: 0.0
  image_analyzer_temperature: 0.0
  text_analyzer_temperature: 0.2
  pattern_temperature: 0.0
  # GPT-5.2 is a reasoning model: reasoning + content count against the
  # max_completion_tokens cap. We give the judge plenty of headroom.
  max_tokens: 8192          # atomic parser
  max_tokens_judge: 16384   # final judge — JSON includes structured reasoning fields
  max_tokens_pattern: 4096  # pattern detector
  max_tokens_image_analyzer: 8192  # focused per-image vision pass
  max_tokens_text_analyzer: 6144   # focused text-distortion pass (T1/T2/T3/C1)
  atomic_enable_thinking: false
  judge_enable_thinking: false
  pattern_enable_thinking: false
  image_analyzer_enable_thinking: false
  text_analyzer_enable_thinking: false
  request_timeout: 600
  use_proxy: true            # gpt-5.2 endpoint MUST go through the corporate proxy
  proxy_url: "http://YOUR_HTTP_PROXY:PORT"
  retry_max_attempts: 6
  retry_backoff_seconds: 5

embedding:
  model: "qwen3-embedding-8b"
  base_url: "http://YOUR_QWEN_EMBEDDING_ENDPOINT/v1"
  api_key: "qwen"
  max_input_chars: 32000    # 8k token cap ~= 24k-32k chars depending on language; we trim defensively
  batch_size: 8
  request_timeout: 600
  use_proxy: false
  retry_max_attempts: 6
  retry_backoff_seconds: 5

vision:
  # Per-image resize for atomic parser & final judge.
  max_image_side: 896
  # Per-image resize for the focused image analyzer (higher resolution for
  # subtle synthesis/editing artifact detection).
  max_image_side_analyzer: 1280
  # Max images per VLM call. Most ReMMDBench posts have 2-6 images; very few
  # have >6. We take the first N (lead image first).
  max_images_per_call: 6
  jpeg_quality: 92

search_tools:
  # All keys empty by design: when empty, the tool is treated as unavailable and skipped.
  google_serper:
    api_key: ""
    endpoint: "https://google.serper.dev/search"
  baidu:
    api_key: ""
    endpoint: ""             # placeholder for a 3rd-party Baidu API
  x:
    api_key: ""
    endpoint: ""

paths:
  bench_root: "/path/to/ReMMD-Agent/ReMMD-agent/ReMMDBench"
  corpus_jsonl: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/corpus.jsonl"
  sample_to_evidence: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/sample_to_evidence.json"
  level1_doc: "/path/to/ReMMD-Agent/ReMMD-agent/一级标签.txt"
  level2_doc: "/path/to/ReMMD-Agent/ReMMD-agent/二级标签.docx"
  rag_index_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/rag_index"
  runs_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/runs"
  prompts_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/prompts"

rag:
  # Aggressive retrieval — let the judge filter, not RAG. Each sample's memory
  # bank is small (~15-20 evidence items), so we recall almost everything that
  # is even loosely relevant and let the LLM reason over it.
  top_k_per_atom: 12        # per-atom retrievals
  max_evidence_per_sample: 30   # final dedup cap going into Final Judge context
  min_score: 0.0            # no floor — keep everything; let the judge filter
  per_type_quota:           # quotas to keep evidence diverse
    image_content: 12
    news_snippet: 12
    fact_brief: 10
    fact_check: 6
    social_post: 6

pipeline:
  concurrency: 100          # high concurrency for fast batch eval
  save_atomic_points: true
  save_retrieved_evidence: true
  save_judge_io: true
  resume: true              # skip samples whose final result file already exists
  atomic_n_passes: 3        # number of concurrent atomic-parse passes (union of atoms)
  use_pattern_detector: false # superseded by image_analyzer + text_analyzer
  use_image_analyzer: true  # dedicated vision pass for V1/V2/C-labels
  use_text_analyzer: true   # dedicated text pass for T1/T2/T3/C1 labels
