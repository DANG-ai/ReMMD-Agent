# ReMMD-Agent — qwen3.5-9b v12 configuration
#
# v12 = COMPLEMENTARY-BIAS calibration to v11.
# v11 (31.80% L1 acc on 500 samples) is the best thinking-mode single run.
# Its measured failure modes were OVER-PREDICTING True (128 vs gold 100) and
# UNDER-PREDICTING False (56 vs gold 99). v12's prompts explicitly invert
# this: the THINKING-MODE GUIDANCE block in final_judge_v12 names v11's bias
# and asks the model to be MORE SCEPTICAL of True / Mostly True and MORE
# WILLING to commit to Mostly False / False. The False threshold is LOWERED
# from "T1 + V1 + 2+ companions OR 6+ L2" to:
#   • T1 + V1 dual (no companions needed),
#   • T1 alone with 2+ companions (3+ L2 total),
#   • V1 alone with 2+ companions (3+ L2 total),
#   • |L2| >= 5 with T1 OR V1,
#   • |L2| >= 6 even without T1/V1.
# This matches the gold-False distribution: |L2|=4 is the modal class for
# gold False (49/99), |L2|=5 is next (29/99); v11 effectively required 6+.
# image_analyze_v12 is also strengthened on V1 detection for the high-fidelity
# AI press-style photos that v11 systematically missed on gold-False posts.
#
# Use as ENSEMBLE PARTNER WITH v11: v11 over-True / under-False; v12
# under-True / over-False; majority vote should average to the correct
# decision. Goal: thinking-mode-only v11+v12 ensemble >= 35% L1 accuracy.
#
#
# v8 = v7 sampling/thinking config + v8 prompts targeting the "thinking-mode
# over-suspicion" failure mode observed in v7 (29.80% L1 acc, with too many
# Mixture / Mostly False predictions because thinking surfaced speculative
# concerns even on gold-True posts).
#
# Same Qwen-team-OFFICIAL sampling settings as v7:
#     temperature        = 1.0
#     top_p              = 0.95
#     top_k              = 20
#     min_p              = 0.0
#     presence_penalty   = 1.5
#     repetition_penalty = 1.0
#     enable_thinking    = true   (all stages)
#
# v8 prompts add:
#   • THINKING-MODE GUIDANCE block at the top of final_judge_v8 (start neutral,
#     balance, do NOT retreat to the middle, target distribution check).
#   • THINKING-MODE GUARDRAIL block on image_analyze_v8 / text_analyze_v8
#     ("YES requires a concrete pixel cue / evidence-quoted contradiction").
#   • Updated Failure Mode #0 explicitly naming the thinking-induced
#     over-suspicion trap.
#
# Qwen team's recommended thinking-mode general-task settings (apply to ALL
# qwen calls — atomic split passes, image_analyzer, text_analyzer, judge):
#     temperature        = 1.0
#     top_p              = 0.95
#     top_k              = 20
#     min_p              = 0.0
#     presence_penalty   = 1.5
#     repetition_penalty = 1.0
#     enable_thinking    = true   (all stages)
#
# Token budgets are raised because thinking-mode emits both reasoning AND
# content; the JSON answer in `content` MUST fit under the budget after
# the model consumes its thinking-token allowance.
#
# Run with:
#   python scripts/run_eval.py --config configs/qwen_v7.yaml --tag qwen_v7_full500
# Smoke (5 samples):
#   python scripts/run_eval.py --config configs/qwen_v7.yaml --tag qwen_v7_smoke --limit 5 --concurrency 5

llm:
  model: "qwen3.5-9b"
  base_url: "http://YOUR_QWEN_9B_ENDPOINT/v1"
  api_key: "qwen"
  # ===== Qwen-team OFFICIAL thinking-mode sampling (general tasks) =====
  # Applied as the DEFAULT on every qwen call. Per-stage temperatures below
  # override only `temperature`; top_p / top_k / min_p / presence_penalty /
  # repetition_penalty stay at the recommended values across all stages.
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  # Per-stage temperature override — kept at 1.0 to match Qwen recommendation.
  judge_temperature: 1.0
  image_analyzer_temperature: 1.0
  text_analyzer_temperature: 1.0
  pattern_temperature: 1.0
  atomic_image_temperature: 1.0
  atomic_cross_modal_temperature: 1.0
  atomic_text_temperature: 1.0
  # Token budgets — raised because thinking-mode tokens consume budget.
  max_tokens: 16384                # legacy single-shot atomic (unused in split mode)
  max_tokens_atomic_image: 12288   # split-mode image-only parser (incl. thinking)
  max_tokens_atomic_cross_modal: 12288  # split-mode cross-modal parser
  max_tokens_atomic_text: 12288    # split-mode text-only parser
  max_tokens_judge: 32768          # final judge — JSON output + thinking
  max_tokens_pattern: 8192
  max_tokens_image_analyzer: 16384  # focused per-image vision pass + thinking
  max_tokens_text_analyzer: 12288   # focused text-distortion pass + thinking
  # ===== ENABLE THINKING for ALL qwen calls =====
  atomic_enable_thinking: true
  judge_enable_thinking: true
  pattern_enable_thinking: true
  image_analyzer_enable_thinking: true
  text_analyzer_enable_thinking: true
  request_timeout: 1200            # thinking-mode is slower → longer timeout
  use_proxy: false                 # qwen endpoints are intranet, no proxy
  proxy_url: null
  retry_max_attempts: 6
  retry_backoff_seconds: 5

embedding:
  model: "qwen3-embedding-8b"
  base_url: "http://YOUR_QWEN_EMBEDDING_ENDPOINT/v1"
  api_key: "qwen"
  max_input_chars: 32000
  batch_size: 8
  request_timeout: 600
  use_proxy: false
  retry_max_attempts: 6
  retry_backoff_seconds: 5

vision:
  # Per-image resize for cross-modal atomic, image_analyzer, final judge.
  max_image_side: 896
  # Higher resolution for the focused image_analyzer (V1/V2 cues).
  max_image_side_analyzer: 1280
  # Slightly higher resolution for the image-only atomic parser to capture
  # fine OCR / overlay details.
  max_image_side_split_image: 1024
  max_images_per_call: 6
  jpeg_quality: 92

search_tools:
  google_serper:
    api_key: ""
    endpoint: "https://google.serper.dev/search"
  baidu:
    api_key: ""
    endpoint: ""
  x:
    api_key: ""
    endpoint: ""

paths:
  bench_root: "/path/to/ReMMD-Agent/ReMMD-agent/ReMMDBench"
  corpus_jsonl: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/corpus.jsonl"
  sample_to_evidence: "/path/to/ReMMD-Agent/ReMMD-agent/rag_database/sample_to_evidence.json"
  level1_doc: "/path/to/ReMMD-Agent/ReMMD-agent/一级标签.txt"
  level2_doc: "/path/to/ReMMD-Agent/ReMMD-agent/二级标签.docx"
  rag_index_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/rag_index"
  runs_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/runs"
  prompts_dir: "/path/to/ReMMD-Agent/ReMMD-agent/agent/prompts"

rag:
  # Aggressive retrieval — let the judge filter, not RAG. Each sample's memory
  # bank is small (~15-20 evidence items); we recall almost everything that
  # is loosely relevant and let the LLM reason over it.
  top_k_per_atom: 12
  max_evidence_per_sample: 30
  min_score: 0.0
  per_type_quota:
    image_content: 12
    news_snippet: 12
    fact_brief: 10
    fact_check: 6
    social_post: 6

pipeline:
  concurrency: 125               # 500 / 125 = 4 waves
  save_atomic_points: true
  save_retrieved_evidence: true
  save_judge_io: true
  resume: true                   # skip samples whose final result file already exists
  atomic_mode: "split"           # "single" | "multi" | "split"
  atomic_n_passes: 3             # only used when atomic_mode == "multi"
  # ===== STRICT LLM-ONLY MODE =====
  # disable_l1_l2_coupling: when true, the LLM judge's three-level outputs
  # (L1 verdict + L2 taxonomy + L3 rationale) are taken VERBATIM. There is
  # NO code rule that promotes / demotes L1 based on L2 composition, no
  # analyzer-L2 union, no fallback. The user has explicitly required this:
  # "the three levels MUST come from the LLM, NOT from code rules."
  disable_l1_l2_coupling: true
  # When `disable_l1_l2_coupling` is true, `analyzer_union_policy` is
  # FORCED to "off" by the pipeline regardless of this setting — but we
  # leave it explicit here for clarity.
  analyzer_union_policy: "off"
  use_analyzer_l2_union: null
  # Updated v3 prompts: stronger anti-bias rules + new few-shot examples
  # specifically targeting (a) V1 alone + companions, (b) narrative-inflation
  # without T1/V1, (c) the "Mostly True trap" with 2-3 L2 labels.
  judge_prompt_name: "final_judge_v12"
  image_analyzer_prompt_name: "image_analyze_v12"
  text_analyzer_prompt_name: "text_analyze_v12"
  split_image_prompt_name: "image_atom_parse"
  split_cross_modal_prompt_name: "cross_modal_atom_parse"
  split_text_prompt_name: "text_atom_parse"
  use_pattern_detector: false    # superseded by image_analyzer + text_analyzer
  use_image_analyzer: true       # dedicated vision pass for V1/V2/C-labels
  use_text_analyzer: true        # dedicated text pass for T1/T2/T3/C1 labels
